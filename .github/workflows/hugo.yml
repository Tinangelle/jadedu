name: Build and deploy personal site

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-jadedu
  cancel-in-progress: true

permissions:
  contents: write

env:
  HUGO_BASE_URL: https://ignissolarisstudio.com/jadedu/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build site
        run: |
          hugo --minify --baseURL "${{ env.HUGO_BASE_URL }}"
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
